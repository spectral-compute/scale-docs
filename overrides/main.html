{% extends "base.html" %}
{% block extrahead %}
  {{ super() }}
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lato:wght@700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <script id="__clarity">
    function __md_clarity() {
      if (window.__md_clarity_initialized) return;
      window.__md_clarity_initialized = true;
      (function (c, l, a, r, i, t, y) {
        c[a] =
          c[a] ||
          function () {
            (c[a].q = c[a].q || []).push(arguments);
          };
        t = l.createElement(r);
        t.async = 1;
        t.src = "https://www.clarity.ms/tag/" + i;
        y = l.getElementsByTagName(r)[0];
        y.parentNode.insertBefore(t, y);
      })(window, document, "clarity", "script", "{{ config.extra.clarity.property }}");
    }
    {% if config.extra.consent %}
    var consent = __md_get("__consent");
    if (consent && consent.analytics) {
      __md_clarity();
    } else {
      document.addEventListener("__md_analytics", __md_clarity);
    }
    {% else %}
    __md_clarity();
    {% endif %}
  </script>
{% endblock %}
