site_name: SCALE Documentation
site_url: https://docs.scale-lang.com/
docs_dir: docs/
extra_css:
  - style.css
theme:
  name: material
  custom_dir: overrides
  logo: logo_white.svg
  favicon: favicon.ico
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.instant
    - navigation.instant.progress
    - navigation.instant.prefetch
    - content.code.copy
    - toc.follow

plugins:
  - search
  - macros
  - mike:
      canonical_version: latest
      alias_type: copy
      version_selector: true
      css_dir: css
      javascript_dir: js

extra:
  branch: master
  generator: false
  version:
    provider: mike
    alias: true
    default: stable
  consent:
    title: Cookie consent
    description: >-
      We use analytics cookies from Google Analytics, Microsoft Clarity, and
      reb2b to understand documentation usage and improve the experience.
    actions:
      - accept
      - reject
      - manage
    cookies:
      analytics:
        name: Analytics (Google Analytics, Microsoft Clarity, and reb2b)
        checked: false
  analytics:
    provider: google
    property: G-FQW9W5SC5P
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/spectral-compute
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/spectral-compute
    - icon: fontawesome/brands/discord
      link: https://discord.gg/KNpgGbTc38

copyright: Copyright &copy; 2026 <a href="https://www.spectralcompute.co.uk">Spectral Compute Ltd</a>

markdown_extensions:
  - toc:
      permalink: "#"
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - attr_list
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
        # Navigation and file naming conventions:
        #
        # - Please refrain from setting custom titles for pages.
        #   Instead, modify the top-level title in the corresponding file.
        # - Please try to name files in a predictable way - their names will become links.
        # - Don't rely on numbered filename prefixes -- we don't need to override their ordering,
        #   as we don't use the autogenerated `nav`.


nav:
  - README.md

  - Get Started:
      - manual/tutorials/how-to-install.md
      - Develop With SCALE:
          - manual/tutorials/overview.md
          - Editor Integration:
              - manual/tutorials/editors/vscode.md
          - manual/tutorials/how-to-use.md
          - manual/tutorials/how-to-use-with-docker.md

  - Compiler:
      - CUDA Language:
          - manual/compiler/dialects.md
          - manual/compiler/inline-ptx.md
          - manual/compiler/language-extensions.md

      - Compiler Options:
          - manual/compiler/diagnostics.md
          - manual/compiler/diagnostic-reference.md
          - manual/compiler/optimisation-flags.md
      # - manual/compiler/compute-capabilities.md

  - Runtime Library:
      - manual/library/overview.md
      - CUDA APIs:
          - manual/library/runtime-extensions.md

          # Rejig, but everything here is library-specific:
          - manual/library/differences.md

          - Implemented APIs:
              - manual/library/apidiff/apis.md
              - manual/library/apidiff/api-driver.md
              - manual/library/apidiff/api-math.md
              - manual/library/apidiff/api-runtime.md

      - manual/library/troubleshooting.md

  - About SCALE:
      - What's New?:
          - manual/changelogs/v1.6.0.md
          - manual/changelogs/v1.5.1.md
          - manual/changelogs/v1.5.0.md
          - manual/changelogs/v1.4.2.md
          - manual/changelogs/v1.3.1.md
          - manual/changelogs/v1.3.0.md
          - manual/changelogs/v1.2.0.md
          - manual/changelogs/v1.1.0.md
          - manual/changelogs/v1.0.2.md
          - manual/changelogs/v1.0.1.md
      - manual/faq.md
      - manual/comparison.md
      - Contact Us:
          - contact/report-a-bug.md
          - contact/join-our-discord.md

  - Legal:
      - licensing.md
      - notices.md

not_in_nav: |
  /use_of_trademarks.md
